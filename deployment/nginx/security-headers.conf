# Shared security headers for all server blocks
# Include this in server blocks: include /etc/nginx/security-headers.conf;

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header X-Permitted-Cross-Domain-Policies "none" always;

# Content Security Policy - permissive for app needs (maps, inline styles from UI libs)
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.tiles.versatiles.org https://*.googleapis.com; frame-ancestors 'self';" always;
