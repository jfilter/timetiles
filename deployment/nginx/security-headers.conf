# Shared security headers for all server blocks
# Include this in server blocks: include /etc/nginx/security-headers.conf;

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
# X-XSS-Protection removed — deprecated in modern browsers, CSP provides protection
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header X-Permitted-Cross-Domain-Policies "none" always;

# Content Security Policy - permissive for app needs (maps, inline styles from UI libs)
# Note: 'unsafe-inline' for script-src is required by Next.js (inline hydration scripts)
# Note: 'unsafe-inline' for style-src is required by Radix UI/shadcn components
# Note: MapLibre GL JS needs `worker-src blob:` (it spawns its worker from a
#   blob URL; `child-src` is the Safari fallback) and `img-src blob:`. The map
#   styles (apps/web/public/map-styles/*.json) load tiles/glyphs/sprites from
#   the BARE host https://tiles.versatiles.org — a `*.tiles.versatiles.org`
#   wildcard does NOT match the bare domain, so both must be listed.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; worker-src 'self' blob:; child-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://tiles.versatiles.org https://*.tiles.versatiles.org https://*.googleapis.com; frame-ancestors 'self';" always;
