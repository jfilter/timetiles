# Nginx configuration for TimeTiles All-in-One deployment
# Manages HTTP/HTTPS traffic and proxies to the Next.js app

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream nextjs {
        server 127.0.0.1:3000;
    }

    # Security: Hide nginx version
    server_tokens off;

    # Request size limits - MUST match app max (1GB for unlimited users)
    client_max_body_size 1024M;
    client_body_buffer_size 1M;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # Timeout hardening
    client_body_timeout 60s;
    client_header_timeout 30s;
    send_timeout 30s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/x-font-ttf application/x-font-opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting zone for auth endpoints only (brute force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # HTTP server
    server {
        listen 80;
        server_name _;

        # Security headers (no HSTS over HTTP)
        include /etc/nginx/security-headers.conf;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Auth endpoints - strict rate limiting to prevent brute force
        location ~ ^/api/(users/login|auth/register|users/forgot-password) {
            limit_req zone=auth burst=3 nodelay;
            include /etc/nginx/proxy-headers.conf;
            proxy_pass http://nextjs;
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        # Everything else
        location / {
            include /etc/nginx/proxy-headers.conf;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            proxy_pass http://nextjs;
            proxy_buffering off;
            proxy_read_timeout 300s;
        }
    }

    # HTTPS server (enabled when SSL certs exist)
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL certificates (self-signed by default, can be replaced with Let's Encrypt)
        ssl_certificate /data/ssl/fullchain.pem;
        ssl_certificate_key /data/ssl/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers (includes HSTS for HTTPS)
        include /etc/nginx/security-headers-https.conf;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Next.js static files (cache aggressively)
        location /_next/static {
            proxy_pass http://nextjs;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # Public static files
        location /static {
            proxy_pass http://nextjs;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        # Auth endpoints - strict rate limiting to prevent brute force
        location ~ ^/api/(users/login|auth/register|users/forgot-password) {
            limit_req zone=auth burst=3 nodelay;
            include /etc/nginx/proxy-headers.conf;
            proxy_pass http://nextjs;
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        # API routes (no rate limiting - app handles per-user limits)
        location /api {
            include /etc/nginx/proxy-headers.conf;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            proxy_pass http://nextjs;
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        # Admin panel (Payload dashboard)
        location /dashboard {
            include /etc/nginx/proxy-headers.conf;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            proxy_pass http://nextjs;
        }

        # Everything else
        location / {
            include /etc/nginx/proxy-headers.conf;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            proxy_pass http://nextjs;
        }
    }
}
