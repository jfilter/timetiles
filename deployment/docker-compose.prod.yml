# Load environment variables from .env.production
# Usage: docker-compose -f docker-compose.prod.yml --env-file .env.production up

services:
  # PostgreSQL with PostGIS extensions
  # Uses kartoza/postgis by default for multi-arch support (amd64 + arm64)
  # Set POSTGRES_IMAGE=postgis/postgis for official image on x86 systems
  postgres:
    image: ${POSTGRES_IMAGE:-kartoza/postgis}:${POSTGRES_VERSION:-17-3.5}
    container_name: ${COMPOSE_PROJECT_NAME:-timetiles}-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      # Standard postgres image variables
      POSTGRES_DB: ${DB_NAME:-timetiles}
      POSTGRES_USER: ${DB_USER:-timetiles_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Kartoza image variables (for ARM64 compatibility)
      POSTGRES_DBNAME: ${DB_NAME:-timetiles}
      POSTGRES_PASS: ${DB_PASSWORD}
      # Kartoza networking - restrict to Docker bridge subnet
      ALLOW_IP_RANGE: "172.16.0.0/12"
      # Disable kartoza's SSL (nginx handles SSL termination)
      FORCE_SSL: "false"
      # PostgreSQL tuning via kartoza's EXTRA_CONF
      EXTRA_CONF: |
        max_locks_per_transaction = ${PG_MAX_LOCKS:-1024}
        max_stack_depth = ${PG_STACK_DEPTH:-7680kB}
        work_mem = ${PG_WORK_MEM:-32MB}
        shared_buffers = ${PG_SHARED_BUFFERS:-256MB}
        max_connections = ${PG_MAX_CONNECTIONS:-100}
        effective_cache_size = ${PG_CACHE_SIZE:-1GB}
        maintenance_work_mem = ${PG_MAINTENANCE_MEM:-128MB}
        checkpoint_completion_target = 0.9
        wal_buffers = 16MB
        random_page_cost = 1.1
        log_statement = ${PG_LOG_STATEMENT:-none}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      # Use -h localhost to force TCP connection (avoids peer auth issues with kartoza/postgis)
      # Don't check for specific database (-d) as it may not exist yet during initial startup
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${DB_USER:-timetiles_user}"]
      interval: 5s
      timeout: 5s
      retries: 10
      # kartoza/postgis first-run init (extensions, users, restart) can take
      # >90s on slow disks; on subsequent recreates the container also bounces
      # postgres briefly during the entrypoint's "restart in foreground" step.
      # 180s gives both cases enough headroom; 5s interval + 10 retries keeps
      # recovery detection snappy after start_period elapses.
      start_period: 180s
    networks:
      - timetiles-network

  # Web application
  web:
    image: ${TIMETILES_IMAGE:-ghcr.io/jfilter/timetiles}:${TIMETILES_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-timetiles}-web
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    # No ports exposed directly - nginx handles this
    expose:
      - "${CONTAINER_PORT:-3000}"
    # Allow the web container to reach host-native services (e.g., scraper runner)
    # Remove this block if scraper runner is not used
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-timetiles_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-timetiles}

      # Payload CMS
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_PAYLOAD_URL: ${NEXT_PUBLIC_PAYLOAD_URL:-http://localhost:3000}

      # Application
      NODE_ENV: ${NODE_ENV:-production}
      DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT:-production}
      PORT: ${CONTAINER_PORT:-3000}

      # Logging (all containers write to /var/log/timetiles/ via shared volume)
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE: /var/log/timetiles/web.log

      # File uploads
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/apps/web/uploads}

      # Email (SMTP) - required for production
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_SMTP_TLS_SERVERNAME: ${EMAIL_SMTP_TLS_SERVERNAME:-}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-${EMAIL_FROM}}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-TimeTiles}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
      EMAIL_SMTP_PASS: ${EMAIL_SMTP_PASS:-}

      # Scraper runner (optional - leave empty to disable)
      SCRAPER_RUNNER_URL: ${SCRAPER_RUNNER_URL:-}
      SCRAPER_API_KEY: ${SCRAPER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Persist uploaded files on host for easy backup/restore
      - ${UPLOAD_HOST_DIR:-./uploads}:/app/apps/web/uploads
      - ${LOG_HOST_DIR:-./logs}:/var/log/timetiles
      # Application config (optional — all values have defaults)
      - ${CONFIG_DIR:-./config}:/app/apps/web/config:ro
    networks:
      - timetiles-network
    healthcheck:
      # 127.0.0.1 not localhost: Node resolves localhost via dns.lookup which
      # tries the AAAA record first, but the server only binds 0.0.0.0.
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => { process.exit(1); })",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Ingest worker — processes ingest workflows (high throughput)
  worker-ingest:
    image: ${TIMETILES_IMAGE:-ghcr.io/jfilter/timetiles}:${TIMETILES_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-timetiles}-worker-ingest
    working_dir: /app/apps/web
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    command:
      [
        "node",
        "/app/node_modules/.pnpm/node_modules/payload/bin.js",
        "jobs:run",
        "--cron",
        "*/10 * * * * *",
        "--queue",
        "ingest",
        "--limit",
        "10",
      ]
    environment:
      DATABASE_URL: postgresql://${DB_USER:-timetiles_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-timetiles}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_PAYLOAD_URL: ${NEXT_PUBLIC_PAYLOAD_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE: /var/log/timetiles/worker-ingest.log
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/apps/web/uploads}
      SCRAPER_RUNNER_URL: ${SCRAPER_RUNNER_URL:-}
      SCRAPER_API_KEY: ${SCRAPER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${UPLOAD_HOST_DIR:-./uploads}:/app/apps/web/uploads
      - ${LOG_HOST_DIR:-./logs}:/var/log/timetiles
      - ${CONFIG_DIR:-./config}:/app/apps/web/config:ro
    networks:
      - timetiles-network
    # Image carries an HTTP-based HEALTHCHECK (Dockerfile.prod) that targets
    # the Next.js server. Workers run `payload jobs:run` instead, so they
    # never bind a port — the inherited check would always fail. Disable.
    healthcheck:
      disable: true

  # General worker — scheduled jobs, webhooks, maintenance, cleanup
  worker-general:
    image: ${TIMETILES_IMAGE:-ghcr.io/jfilter/timetiles}:${TIMETILES_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-timetiles}-worker-general
    working_dir: /app/apps/web
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    command:
      [
        "node",
        "/app/node_modules/.pnpm/node_modules/payload/bin.js",
        "jobs:run",
        "--cron",
        "*/1 * * * *",
        "--queue",
        "default,maintenance",
        "--limit",
        "20",
        "--handle-schedules",
      ]
    environment:
      DATABASE_URL: postgresql://${DB_USER:-timetiles_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-timetiles}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_PAYLOAD_URL: ${NEXT_PUBLIC_PAYLOAD_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE: /var/log/timetiles/worker-general.log
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/apps/web/uploads}
      SCRAPER_RUNNER_URL: ${SCRAPER_RUNNER_URL:-}
      SCRAPER_API_KEY: ${SCRAPER_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${UPLOAD_HOST_DIR:-./uploads}:/app/apps/web/uploads
      - ${LOG_HOST_DIR:-./logs}:/var/log/timetiles
      - ${CONFIG_DIR:-./config}:/app/apps/web/config:ro
    networks:
      - timetiles-network
    # See worker-ingest above.
    healthcheck:
      disable: true

  # Nginx reverse proxy with SSL support
  nginx:
    image: nginx:${NGINX_VERSION:-1.27-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-timetiles}-nginx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE # Required for binding to ports 80/443
      - CHOWN # Required for nginx cache directory setup
      - SETUID # Required for nginx worker process privilege drop
      - SETGID # Required for nginx worker process privilege drop
      - DAC_READ_SEARCH # Required for reading SSL private key files
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ${NGINX_CONF_PATH:-./nginx/nginx.conf}:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./nginx/proxy-headers.conf:/etc/nginx/proxy-headers.conf:ro
      - ./nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro
      - ./nginx/security-headers-https.conf:/etc/nginx/security-headers-https.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - web
    networks:
      - timetiles-network
    healthcheck:
      # 127.0.0.1 not localhost: nginx binds 0.0.0.0:80, but BusyBox wget
      # in the alpine image resolves localhost to ::1 first and never
      # falls back to IPv4 → the check would always report unhealthy.
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Certbot for Let's Encrypt SSL certificates
  certbot:
    image: certbot/certbot:${CERTBOT_VERSION:-v3.3.0}
    container_name: ${COMPOSE_PROJECT_NAME:-timetiles}-certbot
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: '/bin/sh -c ''trap exit TERM; while :; do certbot renew --deploy-hook "touch /etc/letsencrypt/.renewed"; sleep 12h & wait $${!}; done;'''
    depends_on:
      - nginx

volumes:
  postgres_data:
    driver: local
  letsencrypt:
    driver: local
  certbot-webroot:
    driver: local

networks:
  timetiles-network:
    driver: bridge
