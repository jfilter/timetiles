name: Check Payload Types

on:
  workflow_call:
  workflow_dispatch:

jobs:
  check-payload-types:
    name: Check Payload Types
    runs-on: ubuntu-latest
    services:
      postgres:
        image: kartoza/postgis:17-3.5
        env:
          POSTGRES_USER: timetiles_user
          POSTGRES_PASS: timetiles_password
          POSTGRES_PASSWORD: timetiles_password
          POSTGRES_DBNAME: timetiles
          ALLOW_IP_RANGE: "0.0.0.0/0"
          FORCE_SSL: "false"
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -U timetiles_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --shm-size=256mb
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://timetiles_user:timetiles_password@127.0.0.1:5432/timetiles
      PAYLOAD_SECRET: test-secret-key
      PGPASSWORD: timetiles_password
      NEXT_PUBLIC_PAYLOAD_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: ./.github/actions/setup

      - name: Setup database
        run: |
          psql -h 127.0.0.1 -U timetiles_user -d timetiles -c "CREATE EXTENSION IF NOT EXISTS postgis; CREATE EXTENSION IF NOT EXISTS postgis_topology; CREATE EXTENSION IF NOT EXISTS h3; CREATE SCHEMA IF NOT EXISTS payload;"

      - name: Run database migrations
        timeout-minutes: 2
        run: pnpm payload:migrate
        working-directory: apps/web

      - name: Validate Payload generated files
        run: pnpm payload:validate
        working-directory: apps/web

      - name: Upload generated files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payload-generated-files
          path: |
            apps/web/payload-generated-schema.ts
            apps/web/payload-types.ts
          retention-days: 5

      - name: Check for uncommitted changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "❌ Payload generated files are out of sync!"
            echo "Please run 'pnpm payload:generate' and commit the changes."
            git status
            git diff --stat
            exit 1
          else
            echo "✅ Payload generated files are in sync!"
          fi
