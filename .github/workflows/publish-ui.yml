name: Publish @timetiles/ui

on:
  push:
    tags:
      - "ui-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Build UI package
        run: pnpm --filter @timetiles/ui build

      - name: Run UI tests
        run: pnpm --filter @timetiles/ui test

      - name: Publish to npm
        run: pnpm --filter @timetiles/ui publish --access public --no-git-checks --provenance
