name: Publish @timetiles/scraper

on:
  push:
    tags:
      - "scraper-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Build scraper SDK
        run: pnpm --filter @timetiles/scraper build

      - name: Publish to npm
        run: pnpm --filter @timetiles/scraper publish --access public --no-git-checks --provenance
