# Reusable workflow: Create a multi-arch Docker manifest from per-platform digests
# Must run after build-image.yml has produced digest artifacts

name: Create Multi-Arch Manifest

on:
  workflow_call:
    inputs:
      image-name:
        description: "Full image name including registry (must match build-image.yml)"
        required: true
        type: string
      scope:
        description: "Artifact scope (must match build-image.yml)"
        required: true
        type: string
      flavor:
        description: "Docker metadata flavor (e.g., suffix=-allinone,onlatest=true)"
        required: false
        type: string
        default: ""
      # github.event_name is 'workflow_call' in called workflows,
      # so the caller must pass the original event context for tag logic
      original-event-name:
        description: "The original triggering event name (push, schedule, workflow_dispatch)"
        required: true
        type: string
      dispatch-tag:
        description: "The tag input from workflow_dispatch, if any"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  merge:
    name: Create Manifest
    runs-on: ubuntu-latest

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-${{ inputs.scope }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.image-name }}
          flavor: ${{ inputs.flavor }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ inputs.original-event-name == 'push' && startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=edge,enable=${{ inputs.original-event-name == 'schedule' || (inputs.original-event-name == 'workflow_dispatch' && inputs.dispatch-tag == '') }}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          COUNT=$(ls | wc -l)
          if [ "$COUNT" -ne 2 ]; then
            echo "ERROR: Expected 2 platform digests, got $COUNT"
            ls -la
            exit 1
          fi

          DIGESTS=$(printf '${{ inputs.image-name }}@sha256:%s ' *)
          TAG_ARGS=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools create $TAG_ARGS $DIGESTS

      - name: Inspect manifest
        run: |
          TAG=$(jq -cr '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools inspect "$TAG"
