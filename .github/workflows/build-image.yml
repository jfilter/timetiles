# Reusable workflow: Build a Docker image for multiple platforms
# Produces per-platform digest artifacts for later manifest creation

name: Build Multi-Arch Image

on:
  workflow_call:
    inputs:
      image-name:
        description: "Full image name including registry (e.g., ghcr.io/jfilter/timetiles)"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile relative to repo root"
        required: true
        type: string
      context:
        description: "Docker build context path"
        required: false
        type: string
        default: "."
      scope:
        description: "Unique scope for artifacts and cache (e.g., main, allinone)"
        required: true
        type: string
      timeout-minutes:
        description: "Build timeout in minutes"
        required: false
        type: number
        default: 30
      lfs:
        description: "Whether to checkout Git LFS files"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: ${{ inputs.lfs }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ inputs.image-name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ inputs.scope }}-${{ matrix.platform }}
          cache-to: type=gha,mode=min,scope=${{ inputs.scope }}-${{ matrix.platform }}
          # NOTE: SBOM and provenance attestations are not supported with push-by-digest output mode.
          # To add attestations, the build pipeline would need to switch to tag-based pushing
          # or use a separate attestation step after manifest creation.
          provenance: false
          sbom: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ inputs.scope }}-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
