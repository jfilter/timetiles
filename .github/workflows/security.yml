name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 9am UTC to match image build cadence
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Type of scan to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - dependencies
          - docker
          - filesystem
          - config

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write # For PR comments

env:
  TRIVY_VERSION: "0.58.0"
  DOCKER_IMAGE: "timetiles-web:latest"

jobs:
  dependency-scan:
    name: Scan Dependencies
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'dependencies' || github.event.inputs.scan_type == '' }}

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          install: "false"

      - name: Trivy dependency scan
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln,license"
          skip-dirs: "node_modules,dist,build,.next,.turbo"
          report-name: "deps"
          sarif-category: "dependency-scan"

      - name: Create summary
        if: always()
        run: |
          {
            echo "## Dependency Scan Results"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f trivy-deps-report.json ]; then
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-deps-report.json)
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-deps-report.json)
            MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-deps-report.json)
            LOW=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' trivy-deps-report.json)

            {
              echo "### Vulnerability Summary"
              echo "| Severity | Count |"
              echo "|----------|-------|"
              echo "| CRITICAL | ${CRITICAL:-0} |"
              echo "| HIGH | ${HIGH:-0} |"
              echo "| MEDIUM | ${MEDIUM:-0} |"
              echo "| LOW | ${LOW:-0} |"
            } >> "$GITHUB_STEP_SUMMARY"

            LICENSE_ISSUES=$(jq '[.Results[]?.Licenses[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")] | length' trivy-deps-report.json)
            if [ "${LICENSE_ISSUES:-0}" -gt 0 ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "**License Issues Found:** $LICENSE_ISSUES" >> "$GITHUB_STEP_SUMMARY"
            fi

            if [ "${CRITICAL:-0}" -gt 0 ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "**Build failed due to $CRITICAL critical vulnerabilities**" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          fi

      - name: Upload scan reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dependency-scan-reports
          path: |
            trivy-deps-results.sarif
            trivy-deps-report.json
          retention-days: 30

  docker-scan:
    name: Scan Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'docker' || github.event.inputs.scan_type == '' }}

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          install: "false"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # --- Scan 1: Dockerfile.prod ---
      - name: Build Docker image (prod)
        run: |
          docker build -f deployment/Dockerfile.prod -t ${{ env.DOCKER_IMAGE }} .
          docker images ${{ env.DOCKER_IMAGE }}

      - name: Trivy scan (prod image)
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}
          scanners: "vuln,secret,misconfig"
          report-name: "docker"
          sarif-category: "docker-scan-prod"

      - name: Create Docker scan summary (prod)
        if: always()
        run: |
          {
            echo "## Docker Image Scan Results (Dockerfile.prod)"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f trivy-docker-report.json ]; then
            OS_CRITICAL=$(jq '[.Results[]? | select(.Class=="os-pkgs") | .Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-docker-report.json)
            OS_HIGH=$(jq '[.Results[]? | select(.Class=="os-pkgs") | .Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-docker-report.json)
            NODE_CRITICAL=$(jq '[.Results[]? | select(.Class=="lang-pkgs") | .Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-docker-report.json)
            NODE_HIGH=$(jq '[.Results[]? | select(.Class=="lang-pkgs") | .Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-docker-report.json)
            SECRETS=$(jq '[.Results[]? | select(.Class=="secret") | .Secrets[]?] | length' trivy-docker-report.json)
            MISCONFIGS=$(jq '[.Results[]? | select(.MisconfSummary) | .MisconfSummary.Failures] | add // 0' trivy-docker-report.json)

            {
              echo "### Scan Summary"
              echo "| Component | Critical | High |"
              echo "|-----------|----------|------|"
              echo "| OS Packages | $OS_CRITICAL | $OS_HIGH |"
              echo "| Node Dependencies | $NODE_CRITICAL | $NODE_HIGH |"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"

            if [ "$SECRETS" -gt 0 ]; then
              echo "**Secrets Found:** $SECRETS — review and remove exposed credentials!" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi

            if [ "$MISCONFIGS" -gt 0 ]; then
              echo "**Misconfigurations Found:** $MISCONFIGS" >> "$GITHUB_STEP_SUMMARY"
            fi

            TOTAL_CRITICAL=$((OS_CRITICAL + NODE_CRITICAL))
            if [ "$TOTAL_CRITICAL" -gt 0 ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "**Build failed due to $TOTAL_CRITICAL critical vulnerabilities in Docker image**" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi

            IMAGE_SIZE=$(docker images --format "{{.Size}}" "${{ env.DOCKER_IMAGE }}")
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Image Size:** $IMAGE_SIZE" >> "$GITHUB_STEP_SUMMARY"
          fi

      # --- Scan 2: Dockerfile.allinone ---
      # Also scan the all-in-one image which has a different base (ubuntu) and attack surface
      - name: Build Docker image (allinone)
        if: always()
        run: |
          docker build -f deployment/Dockerfile.allinone -t timetiles:allinone .
          docker images timetiles:allinone

      - name: Trivy scan (allinone image)
        if: always()
        uses: ./.github/actions/trivy-scan
        with:
          image-ref: "timetiles:allinone"
          scanners: "vuln,secret,misconfig"
          report-name: "docker-allinone"
          sarif-category: "docker-scan-allinone"

      - name: Create Docker scan summary (allinone)
        if: always()
        run: |
          {
            echo "## Docker Image Scan Results (Dockerfile.allinone)"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f trivy-docker-allinone-report.json ]; then
            OS_CRITICAL=$(jq '[.Results[]? | select(.Class=="os-pkgs") | .Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-docker-allinone-report.json)
            OS_HIGH=$(jq '[.Results[]? | select(.Class=="os-pkgs") | .Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-docker-allinone-report.json)
            SECRETS=$(jq '[.Results[]? | select(.Class=="secret") | .Secrets[]?] | length' trivy-docker-allinone-report.json)

            {
              echo "### Scan Summary"
              echo "| Component | Critical | High |"
              echo "|-----------|----------|------|"
              echo "| OS Packages | $OS_CRITICAL | $OS_HIGH |"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"

            if [ "$SECRETS" -gt 0 ]; then
              echo "**Secrets Found:** $SECRETS — review and remove exposed credentials!" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi

            if [ "$OS_CRITICAL" -gt 0 ]; then
              echo "**Build failed due to $OS_CRITICAL critical vulnerabilities in allinone Docker image**" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          fi

      - name: Upload Docker scan reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: docker-scan-reports
          path: |
            trivy-docker-results.sarif
            trivy-docker-report.json
            trivy-docker-allinone-results.sarif
            trivy-docker-allinone-report.json
          retention-days: 30

  config-scan:
    name: Scan Configuration Files
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'config' || github.event.inputs.scan_type == '' }}

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          install: "false"

      - name: Trivy config scan
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: "config"
          scan-ref: "."
          report-name: "config"
          sarif-category: "config-scan"

      # Fail the job if HIGH or CRITICAL misconfigurations are found
      - name: Check for critical misconfigurations
        if: always()
        run: |
          if [ -f trivy-config-report.json ]; then
            CRITICAL=$(jq '[.Results[]?.Misconfigurations[]? | select(.Severity=="CRITICAL")] | length' trivy-config-report.json)
            if [ "${CRITICAL:-0}" -gt 0 ]; then
              echo "FATAL: Found $CRITICAL critical misconfigurations"
              exit 1
            fi
          fi

      - name: Create config scan summary
        if: always()
        run: |
          {
            echo "## Configuration Scan Results"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f trivy-config-report.json ]; then
            CRITICAL=$(jq '[.Results[]?.Misconfigurations[]? | select(.Severity=="CRITICAL")] | length' trivy-config-report.json)
            HIGH=$(jq '[.Results[]?.Misconfigurations[]? | select(.Severity=="HIGH")] | length' trivy-config-report.json)
            MEDIUM=$(jq '[.Results[]?.Misconfigurations[]? | select(.Severity=="MEDIUM")] | length' trivy-config-report.json)
            LOW=$(jq '[.Results[]?.Misconfigurations[]? | select(.Severity=="LOW")] | length' trivy-config-report.json)

            {
              echo "### Misconfiguration Summary"
              echo "| Severity | Count |"
              echo "|----------|-------|"
              echo "| CRITICAL | ${CRITICAL:-0} |"
              echo "| HIGH | ${HIGH:-0} |"
              echo "| MEDIUM | ${MEDIUM:-0} |"
              echo "| LOW | ${LOW:-0} |"
              echo ""
              echo "### Affected Files"
            } >> "$GITHUB_STEP_SUMMARY"

            jq -r '.Results[]? | select(.Misconfigurations) | .Target' trivy-config-report.json | while read -r file; do
              echo "- \`$file\`" >> "$GITHUB_STEP_SUMMARY"
            done

            if [ "${CRITICAL:-0}" -gt 0 ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "**Critical misconfigurations found**" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Upload config scan reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: config-scan-reports
          path: |
            trivy-config-results.sarif
            trivy-config-report.json
          retention-days: 30

  filesystem-scan:
    name: Scan Filesystem for Secrets
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'filesystem' || github.event.inputs.scan_type == '' }}

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          install: "false"

      - name: Trivy secret scan
        uses: ./.github/actions/trivy-scan
        with:
          scan-type: "fs"
          scan-ref: "."
          scanners: "secret"
          skip-dirs: "node_modules,dist,build,.next,.turbo,.git"
          report-name: "secrets"
          sarif-category: "secret-scan"

      - name: Create secret scan summary
        if: always()
        run: |
          {
            echo "## Secret Scan Results"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f trivy-secrets-report.json ]; then
            SECRET_COUNT=$(jq '[.Results[]?.Secrets[]?] | length' trivy-secrets-report.json)

            if [ "$SECRET_COUNT" -eq 0 ]; then
              echo "No secrets detected" >> "$GITHUB_STEP_SUMMARY"
            else
              {
                echo "**$SECRET_COUNT potential secrets found!**"
                echo ""
                echo "### Detected Secrets"
                echo "| File | Line | Type |"
                echo "|------|------|------|"
              } >> "$GITHUB_STEP_SUMMARY"

              jq -r '.Results[]? | select(.Secrets) | .Target as $file | .Secrets[]? | "\($file) | \(.StartLine) | \(.Title)"' trivy-secrets-report.json | while IFS='|' read -r file line type; do
                echo "| \`$file\` | $line | $type |" >> "$GITHUB_STEP_SUMMARY"
              done

              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "**Action Required:** Review and remove any exposed credentials immediately!" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          fi

      - name: Upload secret scan reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: secret-scan-reports
          path: |
            trivy-secrets-results.sarif
            trivy-secrets-report.json
          retention-days: 30

  pr-comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && always()
    needs: [dependency-scan, docker-scan, config-scan, filesystem-scan]
    continue-on-error: ${{ github.actor == 'dependabot[bot]' }}

    steps:
      - name: Download all scan reports
        uses: actions/download-artifact@v8
        with:
          path: scan-reports

      - name: Create PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            let comment = '## Security Scan Results\n\n';
            comment += `Scan completed at ${new Date().toISOString()}\n\n`;

            function readJSON(filePath) {
              try {
                if (fs.existsSync(filePath)) {
                  return JSON.parse(fs.readFileSync(filePath, 'utf8'));
                }
              } catch (e) {
                console.error(`Error reading ${filePath}:`, e);
              }
              return null;
            }

            const scanTypes = [
              { name: 'Dependencies', path: 'scan-reports/dependency-scan-reports/trivy-deps-report.json' },
              { name: 'Docker Image', path: 'scan-reports/docker-scan-reports/trivy-docker-report.json' },
              { name: 'Configuration', path: 'scan-reports/config-scan-reports/trivy-config-report.json' },
              { name: 'Secrets', path: 'scan-reports/secret-scan-reports/trivy-secrets-report.json' }
            ];

            let hasIssues = false;

            for (const scan of scanTypes) {
              const report = readJSON(scan.path);
              if (report) {
                comment += `### ${scan.name}\n`;

                let criticalCount = 0;
                let highCount = 0;
                let secretCount = 0;

                if (report.Results) {
                  report.Results.forEach(result => {
                    if (result.Vulnerabilities) {
                      result.Vulnerabilities.forEach(vuln => {
                        if (vuln.Severity === 'CRITICAL') criticalCount++;
                        if (vuln.Severity === 'HIGH') highCount++;
                      });
                    }
                    if (result.Secrets) {
                      secretCount += result.Secrets.length;
                    }
                  });
                }

                if (criticalCount > 0 || highCount > 0 || secretCount > 0) {
                  hasIssues = true;
                  if (criticalCount > 0) comment += `- **${criticalCount} Critical** issues\n`;
                  if (highCount > 0) comment += `- **${highCount} High** severity issues\n`;
                  if (secretCount > 0) comment += `- **${secretCount} Secrets** detected\n`;
                } else {
                  comment += 'No critical issues found\n';
                }
                comment += '\n';
              }
            }

            if (hasIssues) {
              comment += '### Action Required\n';
              comment += '- Review the security scan results in the [Security tab](../../security/code-scanning)\n';
              comment += '- Fix critical vulnerabilities before merging\n';
              comment += '- Remove any exposed secrets immediately\n';
            } else {
              comment += '### All Checks Passed\n';
              comment += 'No critical security issues detected.\n';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('Security Scan Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [dependency-scan, docker-scan, config-scan, filesystem-scan]

    steps:
      - name: Create final summary
        run: |
          {
            echo "# Security Scan Complete"
            echo ""
            echo "All security scans have been completed. Check individual job summaries for details."
            echo ""
            echo "## Quick Links"
            echo "- [View Security Alerts](../../security/code-scanning)"
            echo "- [View Dependency Graph](../../network/dependencies)"
            echo "- [View Security Policy](../../security/policy)"
          } >> "$GITHUB_STEP_SUMMARY"
