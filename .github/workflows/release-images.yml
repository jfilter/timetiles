name: Release Docker Images

on:
  push:
    tags:
      - "v*"
  schedule:
    # Daily at 3:00 AM UTC (4:00 AM Berlin time)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g., v1.0.0, or leave empty for edge build)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build all images in parallel ──────────────────────────────────────

  build-main:
    uses: ./.github/workflows/build-image.yml
    with:
      image-name: ghcr.io/${{ github.repository }}
      dockerfile: deployment/Dockerfile.prod
      scope: main
      timeout-minutes: 30
      lfs: true
    secrets: inherit

  build-allinone:
    uses: ./.github/workflows/build-image.yml
    with:
      image-name: ghcr.io/${{ github.repository }}
      dockerfile: deployment/Dockerfile.allinone
      scope: allinone
      timeout-minutes: 30
      lfs: true
    secrets: inherit

  build-timescrape:
    uses: ./.github/workflows/build-image.yml
    with:
      image-name: ghcr.io/${{ github.repository }}-timescrape
      dockerfile: apps/timescrape/Dockerfile
      scope: timescrape
      timeout-minutes: 15
    secrets: inherit

  build-scraper-python:
    uses: ./.github/workflows/build-image.yml
    with:
      image-name: ghcr.io/${{ github.repository }}-scraper-python
      dockerfile: apps/timescrape/images/python/Dockerfile
      context: apps/timescrape/images/python
      scope: scraper-python
      timeout-minutes: 15
    secrets: inherit

  build-scraper-node:
    uses: ./.github/workflows/build-image.yml
    with:
      image-name: ghcr.io/${{ github.repository }}-scraper-node
      dockerfile: apps/timescrape/images/node/Dockerfile
      context: apps/timescrape/images/node
      scope: scraper-node
      timeout-minutes: 15
    secrets: inherit

  # ── Test deployment after main image builds ───────────────────────────

  test-deployment:
    name: Test Production Deployment
    runs-on: ubuntu-24.04
    needs: [build-main]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Download amd64 digest
        uses: actions/download-artifact@v8
        with:
          name: digests-main-ubuntu-24.04
          path: /tmp/digests

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image by digest and tag locally
        run: |
          DIGEST=$(ls /tmp/digests | head -1)
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:${DIGEST}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:${DIGEST} timetiles-test:ci

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Make scripts executable
        run: |
          chmod +x timetiles deployment/timetiles
          chmod +x deployment/tests/*.sh
          chmod +x deployment/tests/helpers/*.sh

      - name: Run deployment tests
        env:
          TIMETILES_IMAGE: timetiles-test
          TIMETILES_VERSION: ci
          SKIP_IMAGE_BUILD: "true"
        run: |
          cd deployment/tests
          ./run-all.sh

      - name: Collect logs on failure
        if: failure()
        run: |
          cd deployment
          if [[ -f docker-compose.test.yml ]]; then
            docker compose -f docker-compose.prod.yml -f docker-compose.test.yml --env-file .env.production logs --tail=200 || true
          else
            docker compose -f docker-compose.prod.yml --env-file .env.production logs --tail=200 || true
          fi

      - name: Cleanup
        if: always()
        run: |
          ./timetiles down || true
          docker system prune -f || true

  # ── Create multi-arch manifests ───────────────────────────────────────

  merge-main:
    needs: [build-main, test-deployment]
    uses: ./.github/workflows/merge-manifest.yml
    with:
      image-name: ghcr.io/${{ github.repository }}
      scope: main
      original-event-name: ${{ github.event_name }}
      dispatch-tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  merge-allinone:
    needs: [build-allinone, test-deployment]
    uses: ./.github/workflows/merge-manifest.yml
    with:
      image-name: ghcr.io/${{ github.repository }}
      scope: allinone
      flavor: "suffix=-allinone,onlatest=true"
      original-event-name: ${{ github.event_name }}
      dispatch-tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  merge-timescrape:
    needs: [build-timescrape, test-deployment]
    uses: ./.github/workflows/merge-manifest.yml
    with:
      image-name: ghcr.io/${{ github.repository }}-timescrape
      scope: timescrape
      original-event-name: ${{ github.event_name }}
      dispatch-tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  merge-scraper-python:
    needs: [build-scraper-python, test-deployment]
    uses: ./.github/workflows/merge-manifest.yml
    with:
      image-name: ghcr.io/${{ github.repository }}-scraper-python
      scope: scraper-python
      original-event-name: ${{ github.event_name }}
      dispatch-tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  merge-scraper-node:
    needs: [build-scraper-node, test-deployment]
    uses: ./.github/workflows/merge-manifest.yml
    with:
      image-name: ghcr.io/${{ github.repository }}-scraper-node
      scope: scraper-node
      original-event-name: ${{ github.event_name }}
      dispatch-tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  # ── Smoke test published images ───────────────────────────────────────

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [merge-main, merge-allinone, merge-timescrape]
    # Run if main was published, even when allinone or timescrape failed/skipped
    if: ${{ !cancelled() && needs.merge-main.result == 'success' }}
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            VERSION="edge"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            if [ -z "$TAG" ]; then
              VERSION="edge"
            else
              VERSION="${TAG#v}"
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate ephemeral test secrets
        id: secrets
        run: |
          echo "payload_secret=$(openssl rand -base64 32 | tr -d '/+=')" >> "$GITHUB_OUTPUT"
          echo "db_password=$(openssl rand -base64 32 | tr -d '/+=')" >> "$GITHUB_OUTPUT"
          echo "scraper_key=$(openssl rand -hex 20)" >> "$GITHUB_OUTPUT"

      - name: Smoke test main image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.tag.outputs.version }}
          PAYLOAD_SECRET: ${{ steps.secrets.outputs.payload_secret }}
          DB_PASSWORD: ${{ steps.secrets.outputs.db_password }}
        working-directory: deployment
        run: |
          # Drive the smoke test from the production compose file. Standalone
          # `docker run` for postgres drifts from prod (no shm_size, no
          # EXTRA_CONF tuning, divergent healthcheck flags) and the kartoza
          # init dance has been making the standalone postgres flaky for
          # months. Compose is the same path operators run.

          cat > .env.production <<EOF
          COMPOSE_PROJECT_NAME=timetiles
          TIMETILES_IMAGE=${IMAGE}
          TIMETILES_VERSION=${VERSION}
          DB_NAME=timetiles
          DB_USER=timetiles_user
          DB_PASSWORD=${DB_PASSWORD}
          DATABASE_URL=postgresql://timetiles_user:${DB_PASSWORD}@postgres:5432/timetiles
          PAYLOAD_SECRET=${PAYLOAD_SECRET}
          DOMAIN_NAME=localhost
          NEXT_PUBLIC_PAYLOAD_URL=http://localhost:3000
          NODE_ENV=production
          DEPLOYMENT_ENVIRONMENT=production
          HOST_PORT=3000
          CONTAINER_PORT=3000
          LOG_LEVEL=info
          EMAIL_SMTP_HOST=smtp.test.invalid
          EMAIL_FROM=test@localhost
          UPLOAD_HOST_DIR=./uploads
          LOG_HOST_DIR=./logs
          CONFIG_DIR=./config
          RESTIC_PASSWORD=test
          EOF

          # Bind mounts must be writable by the container's nextjs uid (1001).
          install -d -o 1001 -g 1001 logs uploads config

          echo "==> Pulling images..."
          docker compose -f docker-compose.prod.yml --env-file .env.production pull postgres web

          # Two-phase startup mirrors the production `timetiles up` flow.
          # Bringing postgres + web up together makes compose treat the brief
          # postgres process bounce during kartoza's first-run init as a
          # dependency failure and exit early ("dependency postgres failed
          # to start"). Waiting for postgres health explicitly first avoids
          # that race.
          echo "==> Starting postgres (kartoza init dance can take ~30s)..."
          docker compose -f docker-compose.prod.yml --env-file .env.production up -d postgres
          for i in $(seq 1 90); do
            status=$(docker inspect --format='{{.State.Health.Status}}' timetiles-postgres 2>/dev/null || echo "unknown")
            if [ "$status" = "healthy" ]; then
              echo "postgres healthy after $((i * 2))s"
              break
            fi
            if [ $((i % 15)) -eq 0 ]; then
              echo "  still waiting ($((i * 2))s elapsed, postgres=$status)"
            fi
            sleep 2
          done
          if [ "$(docker inspect --format='{{.State.Health.Status}}' timetiles-postgres 2>/dev/null)" != "healthy" ]; then
            echo "postgres did not become healthy"
            docker compose -f docker-compose.prod.yml --env-file .env.production logs --tail 80 postgres
            exit 1
          fi

          echo "==> Starting web..."
          docker compose -f docker-compose.prod.yml --env-file .env.production up -d web
          for i in $(seq 1 90); do
            status=$(docker inspect --format='{{.State.Health.Status}}' timetiles-web 2>/dev/null || echo "unknown")
            if [ "$status" = "healthy" ]; then
              echo "web healthy after $((i * 2))s"
              break
            fi
            if [ $((i % 15)) -eq 0 ]; then
              echo "  still waiting ($((i * 2))s elapsed, web=$status)"
            fi
            sleep 2
          done
          if [ "$(docker inspect --format='{{.State.Health.Status}}' timetiles-web 2>/dev/null)" != "healthy" ]; then
            echo "web did not become healthy in time"
            docker compose -f docker-compose.prod.yml --env-file .env.production logs --tail 80 web
            exit 1
          fi

          echo "==> /api/health responds inside the container..."
          docker exec timetiles-web wget -qO- http://127.0.0.1:3000/api/health

          echo "==> Payload CLI is reachable for workers..."
          docker exec timetiles-web node -e "require('fs').accessSync('/app/node_modules/.pnpm/node_modules/payload/bin.js')"

      - name: Smoke test timescrape image
        if: ${{ needs.merge-timescrape.result == 'success' }}
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.tag.outputs.version }}
          SCRAPER_KEY: ${{ steps.secrets.outputs.scraper_key }}
        run: |
          echo "==> Starting scraper runner..."
          docker run -d --name scraper-test -p 4000:4000 \
            -e SCRAPER_API_KEY="${SCRAPER_KEY}" \
            "${IMAGE}-timescrape:${VERSION}"

          echo "==> Checking scraper health..."
          bash .github/scripts/wait-for-health.sh http://localhost:4000/health scraper-test 15 2
          docker stop scraper-test && docker rm scraper-test

      - name: Smoke test allinone image
        if: ${{ needs.merge-allinone.result == 'success' }}
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.tag.outputs.version }}
          PAYLOAD_SECRET: ${{ steps.secrets.outputs.payload_secret }}
          DB_PASSWORD: ${{ steps.secrets.outputs.db_password }}
        run: |
          echo "==> Starting all-in-one..."
          docker run -d --name allinone-test -p 8080:80 \
            -e POSTGRES_PASSWORD="${DB_PASSWORD}" \
            -e PAYLOAD_SECRET="${PAYLOAD_SECRET}" \
            "${IMAGE}:${VERSION}-allinone"

          echo "==> Checking all-in-one health (includes DB init)..."
          bash .github/scripts/wait-for-health.sh http://localhost:8080/api/health allinone-test 45 3
          docker stop allinone-test && docker rm allinone-test

      - name: Verify arm64 manifests
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.tag.outputs.version }}
          ALLINONE_AVAILABLE: ${{ needs.merge-allinone.result == 'success' }}
        run: |
          echo "==> Verifying arm64 manifests..."
          for img in "${IMAGE}:${VERSION}" "${IMAGE}-timescrape:${VERSION}"; do
            if docker manifest inspect "$img" 2>/dev/null | grep -q "arm64"; then
              echo "  $img: arm64 manifest present"
            else
              echo "  WARNING: $img: arm64 manifest missing"
            fi
          done
          if [ "$ALLINONE_AVAILABLE" = "true" ]; then
            img="${IMAGE}:${VERSION}-allinone"
            if docker manifest inspect "$img" 2>/dev/null | grep -q "arm64"; then
              echo "  $img: arm64 manifest present"
            else
              echo "  WARNING: $img: arm64 manifest missing"
            fi
          fi

      - name: Collect logs on failure
        if: failure()
        working-directory: deployment
        run: |
          if [ -f .env.production ]; then
            echo "=== compose containers ==="
            docker compose -f docker-compose.prod.yml --env-file .env.production logs --tail 100 postgres web 2>&1 || true
          fi
          for name in scraper-test allinone-test; do
            echo "=== $name ==="
            docker logs "$name" 2>&1 || echo "(not running)"
            echo ""
          done

      - name: Cleanup
        if: always()
        working-directory: deployment
        run: |
          if [ -f .env.production ]; then
            docker compose -f docker-compose.prod.yml --env-file .env.production down -v 2>/dev/null || true
            rm -f .env.production
          fi
          docker stop scraper-test allinone-test 2>/dev/null || true
          docker rm scraper-test allinone-test 2>/dev/null || true
