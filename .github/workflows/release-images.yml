name: Release Docker Images

on:
  push:
    tags:
      - "v*"
  schedule:
    # Daily at 3:00 AM UTC (4:00 AM Berlin time)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g., v1.0.0, or leave empty for edge build)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build all images in parallel ──────────────────────────────────────

  build-main:
    uses: ./.github/workflows/build-image.yml
    with:
      image-name: ghcr.io/${{ github.repository }}
      dockerfile: deployment/Dockerfile.prod
      scope: main
      timeout-minutes: 30
      lfs: true
    secrets: inherit

  build-allinone:
    uses: ./.github/workflows/build-image.yml
    with:
      image-name: ghcr.io/${{ github.repository }}
      dockerfile: deployment/Dockerfile.allinone
      scope: allinone
      timeout-minutes: 30
      lfs: true
    secrets: inherit

  build-scraper:
    uses: ./.github/workflows/build-image.yml
    with:
      image-name: ghcr.io/${{ github.repository }}-scraper
      dockerfile: apps/timescrape/Dockerfile
      # Scope uses "scraper-runner" to avoid artifact pattern overlap with scraper-python/node
      scope: scraper-runner
      timeout-minutes: 15
    secrets: inherit

  build-scraper-python:
    uses: ./.github/workflows/build-image.yml
    with:
      image-name: ghcr.io/${{ github.repository }}-scraper-python
      dockerfile: apps/timescrape/images/python/Dockerfile
      context: apps/timescrape/images/python
      scope: scraper-python
      timeout-minutes: 15
    secrets: inherit

  build-scraper-node:
    uses: ./.github/workflows/build-image.yml
    with:
      image-name: ghcr.io/${{ github.repository }}-scraper-node
      dockerfile: apps/timescrape/images/node/Dockerfile
      context: apps/timescrape/images/node
      scope: scraper-node
      timeout-minutes: 15
    secrets: inherit

  # ── Test deployment after main image builds ───────────────────────────

  test-deployment:
    name: Test Production Deployment
    runs-on: ubuntu-24.04
    needs: [build-main]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Download amd64 digest
        uses: actions/download-artifact@v8
        with:
          name: digests-main-ubuntu-24.04
          path: /tmp/digests

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image by digest and tag locally
        run: |
          DIGEST=$(ls /tmp/digests | head -1)
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:${DIGEST}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:${DIGEST} timetiles-test:ci

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Make scripts executable
        run: |
          chmod +x timetiles deployment/timetiles
          chmod +x deployment/tests/*.sh
          chmod +x deployment/tests/helpers/*.sh

      - name: Run deployment tests
        env:
          TIMETILES_IMAGE: timetiles-test
          TIMETILES_VERSION: ci
          SKIP_IMAGE_BUILD: "true"
        run: |
          cd deployment/tests
          ./run-all.sh

      - name: Collect logs on failure
        if: failure()
        run: |
          cd deployment
          if [[ -f docker-compose.test.yml ]]; then
            docker compose -f docker-compose.prod.yml -f docker-compose.test.yml --env-file .env.production logs --tail=200 || true
          else
            docker compose -f docker-compose.prod.yml --env-file .env.production logs --tail=200 || true
          fi

      - name: Cleanup
        if: always()
        run: |
          ./timetiles down || true
          docker system prune -f || true

  # ── Create multi-arch manifests ───────────────────────────────────────

  merge-main:
    needs: [build-main, test-deployment]
    uses: ./.github/workflows/merge-manifest.yml
    with:
      image-name: ghcr.io/${{ github.repository }}
      scope: main
      original-event-name: ${{ github.event_name }}
      dispatch-tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  merge-allinone:
    needs: [build-allinone, test-deployment]
    uses: ./.github/workflows/merge-manifest.yml
    with:
      image-name: ghcr.io/${{ github.repository }}
      scope: allinone
      flavor: "suffix=-allinone,onlatest=true"
      original-event-name: ${{ github.event_name }}
      dispatch-tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  merge-scraper:
    needs: [build-scraper, test-deployment]
    uses: ./.github/workflows/merge-manifest.yml
    with:
      image-name: ghcr.io/${{ github.repository }}-scraper
      scope: scraper-runner
      original-event-name: ${{ github.event_name }}
      dispatch-tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  merge-scraper-python:
    needs: [build-scraper-python, test-deployment]
    uses: ./.github/workflows/merge-manifest.yml
    with:
      image-name: ghcr.io/${{ github.repository }}-scraper-python
      scope: scraper-python
      original-event-name: ${{ github.event_name }}
      dispatch-tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  merge-scraper-node:
    needs: [build-scraper-node, test-deployment]
    uses: ./.github/workflows/merge-manifest.yml
    with:
      image-name: ghcr.io/${{ github.repository }}-scraper-node
      scope: scraper-node
      original-event-name: ${{ github.event_name }}
      dispatch-tag: ${{ github.event.inputs.tag }}
    secrets: inherit

  # ── Smoke test published images ───────────────────────────────────────

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [merge-main, merge-allinone, merge-scraper]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            VERSION="edge"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            if [ -z "$TAG" ]; then
              VERSION="edge"
            else
              VERSION="${TAG#v}"
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate ephemeral test secrets
        id: secrets
        run: |
          echo "payload_secret=$(openssl rand -base64 32 | tr -d '/+=')" >> "$GITHUB_OUTPUT"
          echo "db_password=$(openssl rand -base64 32 | tr -d '/+=')" >> "$GITHUB_OUTPUT"
          echo "scraper_key=$(openssl rand -hex 20)" >> "$GITHUB_OUTPUT"

      - name: Smoke test all images
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.tag.outputs.version }}
          PAYLOAD_SECRET: ${{ steps.secrets.outputs.payload_secret }}
          DB_PASSWORD: ${{ steps.secrets.outputs.db_password }}
          SCRAPER_KEY: ${{ steps.secrets.outputs.scraper_key }}
        run: |
          # Reusable health check: wait_for_health <url> <container> <max_attempts> <interval>
          wait_for_health() {
            local url=$1 container=$2 max=${3:-30} interval=${4:-2}
            for ((i=1; i<=max; i++)); do
              if curl -f --max-time 5 "$url" 2>/dev/null; then
                echo " OK"
                return 0
              fi
              echo "  waiting... ($i/$max)"
              sleep "$interval"
            done
            echo "FAILED - $container logs:"
            docker logs "$container"
            return 1
          }

          # --- Main image (needs external PostgreSQL) ---
          echo "==> Starting PostgreSQL..."
          docker network create timetiles-test
          docker run -d --name postgres --network timetiles-test \
            -e POSTGRES_USER=timetiles_user \
            -e POSTGRES_PASSWORD="${DB_PASSWORD}" \
            -e POSTGRES_DB=timetiles \
            -v ${{ github.workspace }}/deployment/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro \
            postgis/postgis:17-3.5-alpine

          echo "==> Waiting for PostgreSQL..."
          wait_for_health "" postgres 30 2 || true
          # pg_isready is more reliable for postgres
          for i in {1..30}; do
            docker exec postgres pg_isready -U timetiles_user -d timetiles 2>/dev/null && break
            sleep 2
          done

          echo "==> Starting main app..."
          docker run -d --name timetiles --network timetiles-test -p 3000:3000 \
            -e DATABASE_URL="postgresql://timetiles_user:${DB_PASSWORD}@postgres:5432/timetiles" \
            -e PAYLOAD_SECRET="${PAYLOAD_SECRET}" \
            -e NEXT_PUBLIC_PAYLOAD_URL=http://localhost:3000 \
            -e EMAIL_SMTP_HOST=smtp.test.invalid \
            "${IMAGE}:${VERSION}"

          echo "==> Checking main app health..."
          wait_for_health http://localhost:3000/api/health timetiles 30 2

          # --- Scraper image ---
          echo "==> Starting scraper runner..."
          docker run -d --name scraper-test -p 4000:4000 \
            -e SCRAPER_API_KEY="${SCRAPER_KEY}" \
            "${IMAGE}-scraper:${VERSION}"

          echo "==> Checking scraper health..."
          wait_for_health http://localhost:4000/health scraper-test 15 2
          docker stop scraper-test && docker rm scraper-test

          # --- All-in-one image (PostgreSQL bundled inside) ---
          echo "==> Starting all-in-one..."
          docker run -d --name allinone-test -p 8080:80 \
            -e POSTGRES_PASSWORD="${DB_PASSWORD}" \
            -e PAYLOAD_SECRET="${PAYLOAD_SECRET}" \
            "${IMAGE}:${VERSION}-allinone"

          echo "==> Checking all-in-one health (includes DB init)..."
          wait_for_health http://localhost:8080/api/health allinone-test 45 3
          docker stop allinone-test && docker rm allinone-test

          # Verify arm64 manifests exist (full arm64 deployment test not possible on amd64 runner)
          echo "==> Verifying arm64 manifests..."
          for img in "${IMAGE}:${VERSION}" "${IMAGE}:${VERSION}-allinone" "${IMAGE}-scraper:${VERSION}"; do
            if docker manifest inspect "$img" 2>/dev/null | grep -q "arm64"; then
              echo "  $img: arm64 manifest present"
            else
              echo "  WARNING: $img: arm64 manifest missing"
            fi
          done

      - name: Collect logs on failure
        if: failure()
        run: |
          for name in timetiles postgres scraper-test allinone-test; do
            echo "=== $name ==="
            docker logs "$name" 2>&1 || echo "(not running)"
            echo ""
          done

      - name: Cleanup
        if: always()
        run: |
          docker stop timetiles postgres scraper-test allinone-test 2>/dev/null || true
          docker rm timetiles postgres scraper-test allinone-test 2>/dev/null || true
          docker network rm timetiles-test 2>/dev/null || true
