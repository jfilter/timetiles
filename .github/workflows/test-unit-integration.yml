name: Unit & Integration Tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: kartoza/postgis:17-3.5
        env:
          POSTGRES_USER: timetiles_user
          POSTGRES_PASS: timetiles_password
          POSTGRES_PASSWORD: timetiles_password
          POSTGRES_DBNAME: timetiles
          ALLOW_IP_RANGE: "0.0.0.0/0"
          FORCE_SSL: "false"
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -U timetiles_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --shm-size=256mb
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://timetiles_user:timetiles_password@127.0.0.1:5432/timetiles
      PAYLOAD_SECRET: test-secret-key
      PGPASSWORD: timetiles_password
      NEXT_PUBLIC_PAYLOAD_URL: http://localhost:3000
      NODE_OPTIONS: "--max-old-space-size=8192"

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Setup test databases
        run: |
          setup_db() {
            psql -h 127.0.0.1 -U timetiles_user -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = '$1'" | grep -q 1 || psql -h 127.0.0.1 -U timetiles_user -d postgres -c "CREATE DATABASE \"$1\";"
            psql -h 127.0.0.1 -U timetiles_user -d "$1" -c "CREATE EXTENSION IF NOT EXISTS postgis; CREATE EXTENSION IF NOT EXISTS postgis_topology; CREATE EXTENSION IF NOT EXISTS h3; CREATE SCHEMA IF NOT EXISTS payload;"
          }

          setup_db timetiles
          for i in {1..4}; do
            setup_db "timetiles_test_$i"
          done

      - name: Run database migrations
        timeout-minutes: 2
        run: pnpm payload:migrate
        working-directory: apps/web

      - name: Run tests with coverage
        id: test-coverage
        run: pnpm test:coverage
        working-directory: apps/web
        continue-on-error: true

      - name: Report coverage
        if: steps.test-coverage.outcome == 'success' || steps.test-coverage.outcome == 'failure'
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            npx tsx scripts/coverage-summary.ts --details >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Coverage report not generated" >> "$GITHUB_STEP_SUMMARY"
          fi
        working-directory: apps/web

      - name: SonarCloud Scan
        if: always() && github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Fail if tests failed
        if: steps.test-coverage.outcome == 'failure'
        run: exit 1
