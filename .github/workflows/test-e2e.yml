name: E2E Tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Run inside the official Playwright image: browsers + OS deps are baked in
    # at /ms-playwright (PLAYWRIGHT_BROWSERS_PATH), eliminating the flaky
    # cdn.playwright.dev browser download. The tag MUST match the playwright
    # package version (apps/web/package.json). Runs as root by default, so
    # Chromium requires --no-sandbox (set for CI in playwright.config.ts);
    # --ipc=host avoids Chromium shared-memory crashes.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --ipc=host
    services:
      postgres:
        image: kartoza/postgis:17-3.5
        env:
          POSTGRES_USER: timetiles_user
          POSTGRES_PASS: timetiles_password
          POSTGRES_PASSWORD: timetiles_password
          POSTGRES_DBNAME: timetiles
          ALLOW_IP_RANGE: "0.0.0.0/0"
          FORCE_SSL: "false"
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -U timetiles_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --shm-size=256mb
        ports:
          - 5432:5432

    env:
      # Base connection for database operations (globalSetup creates per-worker DBs).
      # Host is the `postgres` service label: in a container job, services are
      # reachable by name on the job network, not via 127.0.0.1 / the port map.
      DATABASE_URL: postgresql://timetiles_user:timetiles_password@postgres:5432/postgres
      PAYLOAD_SECRET: test-secret-key
      NEXT_PUBLIC_PAYLOAD_URL: http://localhost:3000
      PGPASSWORD: timetiles_password
      NODE_ENV: test
      PAYLOAD_CONFIG_PATH: ./payload.config.ts
      CI: true

    steps:
      # git-lfs is not bundled in the Playwright image; install it (as root)
      # before checkout so the `lfs: true` fetch can pull the asset binaries.
      - name: Install git-lfs
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git-lfs

      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: ./.github/actions/setup

      # @timetiles/ui is built by the Playwright global setup
      # (tests/e2e/global-setup.ts) before `next build`. Playwright browsers are
      # preinstalled in the container image (/ms-playwright), so there is no
      # browser download/install step here.

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: web-build
          path: apps/web/.next

      - name: Prepare uploads directory
        run: mkdir -p uploads
        working-directory: apps/web

      - name: Run E2E tests (parallel workers)
        timeout-minutes: 20
        run: pnpm test:e2e
        working-directory: apps/web

      - name: Upload E2E test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: apps/web/test-results
          retention-days: 7

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
