name: E2E Tests

on:
  workflow_call:
  workflow_dispatch:

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: kartoza/postgis:17-3.5
        env:
          POSTGRES_USER: timetiles_user
          POSTGRES_PASS: timetiles_password
          POSTGRES_PASSWORD: timetiles_password
          POSTGRES_DBNAME: timetiles
          ALLOW_IP_RANGE: "0.0.0.0/0"
          FORCE_SSL: "false"
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -U timetiles_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --shm-size=256mb
        ports:
          - 5432:5432

    env:
      # Base connection for database operations (globalSetup creates per-worker DBs)
      DATABASE_URL: postgresql://timetiles_user:timetiles_password@127.0.0.1:5432/postgres
      PAYLOAD_SECRET: test-secret-key
      NEXT_PUBLIC_PAYLOAD_URL: http://localhost:3000
      PGPASSWORD: timetiles_password
      NODE_ENV: test
      PAYLOAD_CONFIG_PATH: ./payload.config.ts
      CI: true

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: ./.github/actions/setup

      # Note: @timetiles/ui is built by the Playwright global setup
      # (tests/e2e/global-setup.ts) before `next build`, so no separate
      # build step is needed here.

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: web-build
          path: apps/web/.next

      - name: Determine Playwright version
        id: pw
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
        working-directory: apps/web

      - name: Restore Playwright browser cache
        id: pw-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      # On a cache miss the browsers are downloaded from cdn.playwright.dev,
      # which intermittently stalls (a download hangs with no progress and no
      # internal timeout). Bound each attempt with `timeout` and retry so a
      # stalled connection is killed and retried instead of hanging the job.
      # On a cache hit the browser is already present and only the (fast) OS
      # deps are installed.
      - name: Setup Playwright
        timeout-minutes: 16
        run: |
          installed=
          for attempt in 1 2 3; do
            echo "::group::Playwright install (attempt ${attempt})"
            if timeout 300 pnpm playwright install chromium --with-deps; then
              installed=1
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
            echo "Playwright browser install attempt ${attempt} stalled or failed; retrying..."
          done
          if [ -z "${installed}" ]; then
            echo "Playwright browser install did not complete after 3 attempts"
            exit 1
          fi
          mkdir -p uploads
        working-directory: apps/web

      # Save only after a successful install (never cache a partial download
      # from a timed-out run) and only when the restore was a miss.
      - name: Save Playwright browser cache
        if: success() && steps.pw-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      - name: Run E2E tests (parallel workers)
        timeout-minutes: 20
        run: pnpm test:e2e
        working-directory: apps/web

      - name: Upload E2E test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: apps/web/test-results
          retention-days: 7

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
