name: Build & Quality Checks

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    name: Build & Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: ./.github/actions/setup

      - name: Check theme abstraction
        timeout-minutes: 1
        run: ./scripts/check-theme-abstraction.sh

      - name: Check CVA variant duplicates
        timeout-minutes: 1
        run: ./scripts/check-cva-variants.sh packages/ui/src

      - name: Check formatting (oxfmt)
        timeout-minutes: 2
        # --threads=1 works around oxc-project/oxc#20033: race condition in
        # worker threads causes random CSS files to crash with "Cannot use
        # 'in' operator to search for 'importer' in undefined".
        run: pnpm exec oxfmt --check --threads=1 .

      - name: Lint code (oxlint + ESLint)
        timeout-minutes: 5
        run: pnpm lint --filter=!docs

      - name: Type check (tsc full)
        timeout-minutes: 5
        run: pnpm typecheck:full || (cat apps/web/.typecheck-results/$(ls -t apps/web/.typecheck-results/ 2>/dev/null | head -1) 2>/dev/null; exit 1)

      - name: Lint infrastructure
        timeout-minutes: 2
        run: |
          mkdir -p "$HOME/.local/bin"
          export PATH="$HOME/.local/bin:$PATH"

          # Download linting tools (to files first, not piped)
          curl -sSfL https://github.com/rhysd/actionlint/releases/download/v1.7.4/actionlint_1.7.4_linux_amd64.tar.gz -o /tmp/actionlint.tar.gz
          tar xz -C "$HOME/.local/bin" -f /tmp/actionlint.tar.gz actionlint && rm /tmp/actionlint.tar.gz
          wget -q https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 -O "$HOME/.local/bin/hadolint"
          curl -sSfL https://github.com/mrtazz/checkmake/releases/download/0.2.2/checkmake-0.2.2.linux.amd64 -o "$HOME/.local/bin/checkmake"
          chmod +x "$HOME/.local/bin"/{actionlint,hadolint,checkmake}

          pnpm lint:devops

      - name: Build UI package
        timeout-minutes: 2
        run: pnpm build
        working-directory: packages/ui

      - name: Build Storybook
        timeout-minutes: 3
        run: pnpm storybook:build
        working-directory: packages/ui

      - name: Build web app
        timeout-minutes: 10
        run: pnpm build:compile
        working-directory: apps/web
        env:
          DATABASE_URL: postgresql://timetiles_user:timetiles_password@localhost:5432/timetiles
          PAYLOAD_SECRET: test-secret-key
          NEXT_PUBLIC_PAYLOAD_URL: http://localhost:3000
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: apps/web/.next
          include-hidden-files: true
          retention-days: 1
