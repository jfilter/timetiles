name: "Setup TimeTiles"
description: "Setup Node.js + pnpm and install dependencies (checkout must happen before this)"

inputs:
  install:
    description: "Run pnpm install after setup"
    default: "true"

runs:
  using: "composite"
  steps:
    - uses: pnpm/action-setup@v4

    - uses: actions/setup-node@v6
      with:
        node-version: "24"
        # Only cache the pnpm store when we actually install: without
        # `pnpm install` the store path never exists, and the post-step
        # cache save fails the job on a cache miss.
        cache: ${{ inputs.install == 'true' && 'pnpm' || '' }}

    - if: inputs.install == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile
