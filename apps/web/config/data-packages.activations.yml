# Auto-activated data packages per DEPLOYMENT_ENVIRONMENT.
#
# Each entry: { slug, params? }. `slug` references a manifest in
# config/data-packages/. `params` provides values for parameterized
# manifests (e.g. ucdp-hdx country/dataset/resource UUIDs) — leave it
# off for non-parameterized packages.
#
# Activation runs on Payload boot when RUN_AUTO_ACTIVATIONS=true and
# DEPLOYMENT_ENVIRONMENT matches a key below. Already-activated entries
# are skipped silently.

