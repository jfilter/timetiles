slug: berlin-demonstrations
name: Berliner Versammlungen
description: >-
  Demonstrations and assemblies registered with the Berlin police authority
  (Versammlungsbehoerde). Data sourced from polizeistressi.de, covering
  events since 2021 with ~48,000 records. Includes topic, location, date,
  and route information.
category: civic-data
region: Berlin, Germany
tags:
  - demonstrations
  - protests
  - civic
  - berlin
  - germany
license: Public Domain
estimatedRecords: 48000

source:
  url: "https://adrrwafktwmspftyaqpz.supabase.co/rest/v1/versammlungen?select=*"
  format: json
  auth:
    type: api-key
    apiKeyHeader: apikey
    apiKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkcnJ3YWZrdHdtc3BmdHlhcXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1ODQ1OTcsImV4cCI6MjA4NzE2MDU5N30.p2MJD14vh3xk3J5538Uv-uBGArgthp2HO5cna3yELrc"
  jsonApi:
    pagination:
      enabled: true
      type: offset
      pageParam: offset
      limitParam: limit
      limitValue: 1000
      maxPages: 100
  excludeFields:
    - source
    - reference_key
    - is_active
    - first_seen_at
    - last_seen_at
    - raw_data
    - created_at
    - updated_at
    - content_hash

catalog:
  name: polizeistressi.de
  description: Berlin demonstration registration data from polizeistressi.de
  isPublic: true

dataset:
  name: Berliner Versammlungen
  language: deu
  idStrategy:
    type: external
    externalIdPath: id
    duplicateStrategy: update

transforms:
  # Build full address for geocoding: "Pariser Platz 1, 10117 Berlin"
  - type: concatenate
    fromFields: [place, zip]
    separator: ", "
    to: fullAddress
  - type: string-op
    from: fullAddress
    operation: expression
    expression: 'concat(value, " Berlin")'
  # Short title from topic (first 80 chars), keep topic as description
  - type: extract
    from: topic
    to: title
    pattern: "^(.{1,80})"

fieldMappings:
  titlePath: title
  descriptionPath: topic
  timestampPath: start_time
  endTimestampPath: end_time
  locationNamePath: place
  locationPath: fullAddress

schedule:
  type: frequency
  frequency: daily
  schemaMode: additive
  timezone: Europe/Berlin

reviewChecks:
  skipDuplicateRateCheck: true

geocodingBias:
  countryCodes:
    - de
  viewBox:
    minLon: 13.08
    minLat: 52.33
    maxLon: 13.76
    maxLat: 52.68
  bounded: true
