slug: koeln-veranstaltungen
name: Kölner Veranstaltungen
description: >-
  Public events from the City of Cologne open data portal. The API returns
  upcoming events with title, dates, venue, address, district, and geographic
  coordinates. Updated daily with a 90-day lookahead.
category: events
region: Köln, Germany
tags:
  - events
  - veranstaltungen
  - koeln
  - cologne
  - nrw
  - germany
license: dl-de/by-2-0
estimatedRecords: 500

source:
  url: "http://www.stadt-koeln.de/externe-dienste/open-data/events-od.php?ndays=90"
  format: json
  jsonApi:
    recordsPath: items
  excludeFields:
    - oepnv
    - ort
    - plz
    - hausnummer
    - strasse

catalog:
  name: Offene Daten Köln
  description: Open data portal of the City of Cologne
  isPublic: true

dataset:
  name: Kölner Veranstaltungen
  language: deu
  idStrategy:
    type: external
    externalIdPath: eventId
    duplicateStrategy: update

transforms:
  # Extract numeric event ID from link URL for stable deduplication
  - type: extract
    from: link
    to: eventId
    pattern: '/daten/(\d+)/'
  # Build full image URL from relative teaserbild path
  - type: string-op
    from: teaserbild
    operation: expression
    expression: 'concat("https://www.stadt-koeln.de", value)'
  - type: rename
    from: teaserbild
    to: image
  # Clean HTML from text fields
  - type: string-op
    from: preis
    operation: expression
    expression: "stripHtml(value)"
  - type: string-op
    from: uhrzeit
    operation: expression
    expression: "stripHtml(value)"
  - type: string-op
    from: description
    operation: expression
    expression: "stripHtml(value)"

fieldMappings:
  titlePath: title
  descriptionPath: description
  timestampPath: beginndatum
  endTimestampPath: endedatum
  locationNamePath: veranstaltungsort
  latitudePath: latitude
  longitudePath: longitude

schedule:
  type: frequency
  frequency: daily
  schemaMode: additive
  timezone: Europe/Berlin

reviewChecks:
  skipDuplicateRateCheck: true
