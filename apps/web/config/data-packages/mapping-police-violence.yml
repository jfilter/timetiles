summary: >-
  Comprehensive database of people killed by police in the United States since
  2013, maintained by Campaign Zero. Includes incident details, victim
  demographics, officer information, agency data, and geographic coordinates.
  Sourced from Fatal Encounters, Washington Post, media reports, and official
  records. The data "belongs to the public" per the project's methodology statement.
