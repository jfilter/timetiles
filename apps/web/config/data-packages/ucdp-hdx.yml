slug: ucdp-hdx
title: "UCDP Conflict Events — {{country}} (HDX)"
summary: >-
  Georeferenced conflict events in {{country}} from the Uppsala Conflict
  Data Program (UCDP) via the Humanitarian Data Exchange. Covers
  state-based, non-state, and one-sided violence with casualty
  estimates. Updated monthly.
category: conflict
region: "{{country}}"
tags:
  - conflict
  - violence
  - ucdp
  - casualties
  - hdx
license: CC-BY-IGO
url: https://data.humdata.org
publisher:
  name: Uppsala Conflict Data Program
  acronym: UCDP
  url: https://ucdp.uu.se
  country: se
  official: false
coverage:
  start: "1989-01-01"

parameters:
  - name: country
    label: Country name
    required: true
    example: "Myanmar"
  - name: dataset_id
    label: HDX dataset UUID
    required: true
    example: "e7d38839-fd46-4693-9a5f-b8776262e3f8"
  - name: resource_id
    label: HDX resource UUID
    required: true
    example: "858cbf79-6c0b-4a9b-9135-cb85ae3bb348"

source:
  url: "https://data.humdata.org/dataset/{{dataset_id}}/resource/{{resource_id}}/download/"
  format: csv
  excludeFields:
    # Internal UCDP IDs
    - relid
    - conflict_dset_id
    - conflict_new_id
    - dyad_dset_id
    - dyad_new_id
    - side_a_dset_id
    - side_a_new_id
    - side_b_dset_id
    - side_b_new_id
    - gwnoa
    - gwnob
    - priogrid_gid
    - country_id
    # Source metadata (not useful for display)
    - number_of_sources
    - source_article
    - source_office
    - source_date
    - source_original
    # Precision/coding fields
    - active_year
    - code_status
    - where_prec
    - where_coordinates
    - event_clarity
    - date_prec
    # Geo duplicates (lat/lon already mapped)
    - geom_wkt
    # Redundant with mapped fields or dataset context
    - side_a
    - side_b
    - deaths_a
    - deaths_b
    - deaths_unknown
    - low
    - high
    - year
    - iso3
    - country
    - region

catalog:
  name: "UCDP Conflict Events"
  description: "Georeferenced conflict events from the Uppsala Conflict Data Program (UCDP) via the Humanitarian Data Exchange"
  isPublic: true
  license: CC-BY-IGO
  sourceUrl: "https://data.humdata.org"

dataset:
  name: "{{country}}"
  language: eng
  idStrategy:
    type: external
    externalIdPath: id
    duplicateStrategy: update

transforms:
  # Map violence type codes to human-readable labels
  - type: string-op
    from: type_of_violence
    to: Violence Type
    operation: expression
    expression: >-
      (toNumber(value) == 1 ? "State-based" :
       toNumber(value) == 2 ? "Non-state" :
       toNumber(value) == 3 ? "One-sided" : value)
  # Rename fields for readable labels in event detail
  - type: rename
    from: conflict_name
    to: Conflict
  - type: rename
    from: dyad_name
    to: Parties
  - type: rename
    from: best
    to: Fatalities
  - type: rename
    from: deaths_civilians
    to: Civilian Deaths
  - type: rename
    from: adm_1
    to: Province
  - type: rename
    from: adm_2
    to: District
  # Build description from renamed fields
  - type: concatenate
    fromFields: [Violence Type, Parties]
    separator: " — "
    to: event_summary

fieldMappings:
  titlePath: source_headline
  descriptionPath: event_summary
  timestampPath: date_start
  endTimestampPath: date_end
  locationNamePath: where_description
  latitudePath: latitude
  longitudePath: longitude

schedule:
  type: frequency
  frequency: monthly
  schemaMode: additive
  timezone: UTC

reviewChecks:
  skipGeocodingCheck: true
